name: Deploy GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
  workflow_run:
    workflows: ["Update Junior Gold dashboard"]
    types: [completed]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run points at the updater's starting commit. The updater may
          # push a newer dashboard.json, so always deploy the latest main branch.
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
