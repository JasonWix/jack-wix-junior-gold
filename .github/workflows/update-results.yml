# Workflow build: 2026-07-13-v4-bowler-explorer
name: Update Junior Gold dashboard

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC. Minnesota is CDT (UTC-5) in July.

    # Monday, July 13 — Round 1 at 7:00 AM CT
    - cron: "2-59/5 11-14 13 7 *"
    - cron: "7,22,37,52 15-23 13 7 *"
    - cron: "7,22,37,52 0-2 14 7 *"

    # Tuesday, July 14 — Round 2 at 8:30 PM CT
    - cron: "7,22,37,52 11-23 14 7 *"
    - cron: "2-59/5 0-4 15 7 *"

    # Wednesday, July 15 — Round 3 at 4:00 PM CT
    - cron: "7,22,37,52 11-19 15 7 *"
    - cron: "2-59/5 20-23 15 7 *"
    - cron: "2-59/5 0-1 16 7 *"
    - cron: "7,22,37,52 2-3 16 7 *"

    # Thursday, July 16 — Round 4 at 11:30 AM CT
    - cron: "7,22,37,52 11-15 16 7 *"
    - cron: "2-59/5 16-20 16 7 *"
    - cron: "7,22,37,52 21-23 16 7 *"
    - cron: "7,22,37,52 0-3 17 7 *"

    # Overnight fallback during qualifying
    - cron: "11 4-10 13-16 7 *"

permissions:
  contents: write

concurrency:
  group: junior-gold-dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate parser
        run: python -m unittest discover -s tests -v

      - name: Refresh and publish dashboard data
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Start from the newest main branch, regenerate the dashboard, and push.
          # If main changes during the run, start over from the new main and retry.
          for attempt in 1 2 3; do
            echo "Update attempt $attempt of 3"

            git fetch origin main
            git reset --hard origin/main

            python scripts/update_results.py

          python - <<'PY'
          import json
          data = json.load(open("data/dashboard.json", encoding="utf-8"))
          current = data["current"]
          assert current["games_complete"] in {4, 8, 12, 16}
          assert 0 < current["average"] <= 300
          assert abs(current["total"] - current["average"] * current["games_complete"]) <= 0.1
          assert current["field_size"] >= current["position"]
          assert data["source_status"]["status"] in {"current", "delayed"}
          assert 1 <= len(data["history"]) <= 96
          assert data["history"][-1]["games_complete"] == current["games_complete"]
          assert data["history"][-1]["total"] == current["total"]
          explorer = json.load(open("data/bowlers.json", encoding="utf-8"))
          assert set(explorer["years"]) >= {"2025", "2026"}
          assert explorer["years"]["2025"]["field_size"] == 1341
          assert len(explorer["years"]["2025"]["bowlers"]) == 1341
          assert any(bowler["name"] == "Jack Wix" for bowler in explorer["years"]["2026"]["bowlers"])
          live = explorer["years"]["2026"]
          assert set(live["divisions"]) == {"U12B", "U12G", "U14B", "U14G", "U16B", "U16G", "U18B", "U18G"}
          assert sum(item["registration_count"] for item in live["divisions"].values()) == 3812
          for code, division in live["divisions"].items():
              assert division["division_code"] == code
              assert division["profile_count"] == len(division["bowlers"])
              assert division["profile_count"] >= division["registration_count"]
          print("Dashboard validation passed:", current)
          PY

            if git diff --quiet -- data/dashboard.json data/bowlers.json; then
              echo "No dashboard changes detected."
              exit 0
            fi

            git add data/dashboard.json data/bowlers.json
            git commit -m "Update Junior Gold results"

            if git push origin HEAD:main; then
              echo "Dashboard update pushed successfully."
              exit 0
            fi

            echo "Main changed before the push completed. Retrying from the newest main..."
            sleep $((attempt * 5))
          done

          echo "Unable to publish dashboard data after 3 attempts."
          exit 1
